[settings]
lockfile = true
locked = true
dotfiles.root = "~/.local/share/dotfiles/home"

[tools]
gh = "latest"
"aqua:eza-community/eza" = { version = "latest", os = ["linux"] }
"conda:eza" = { version = "latest", os = ["macos"] }
fzf = "latest"
fnox = "latest"
helix = "latest"
gitui = "latest"
git-lfs = "latest"
jaq = "latest"
pitchfork = "latest"
starship = "latest"
vivid = "latest"
cargo-binstall = "latest"
delta = "latest"
"aqua:reemus-dev/gitnr" = { version = "latest", os = ["macos"] }
"aqua:BurntSushi/ripgrep" = "latest"
"github:max-sixty/worktrunk" = "latest"
"github:openai/symphony" = { version = "latest", bin = "symphony" }

[tools."github:MitMaro/git-interactive-rebase-tool"]
version = "latest"
[tools."github:MitMaro/git-interactive-rebase-tool".platforms]
macos-arm64 = { asset_pattern = "git-interactive-rebase-tool-*-macos-*_arm" }
macos-x64 = { asset_pattern = "git-interactive-rebase-tool-*-macos-*_intel" }
linux-x64 = { asset_pattern = "git-interactive-rebase-tool-*-ubuntu-*_amd64.deb" }
linux-arm64 = { asset_pattern = "git-interactive-rebase-tool-*-ubuntu-*_arm64.deb" }

[bootstrap.repos]
"~/.local/share/dotfiles" = { url = "https://github.com/jasonmorganson/dotfiles.git", ref = "main" }
"~/.local/share/mise/repos/gitalias" = { url = "https://github.com/GitAlias/gitalias.git", ref = "main" }
"~/.config/nushell/scripts/nu_scripts" = { url = "https://github.com/nushell/nu_scripts.git" }

[bootstrap.mise_shell_activate]
zsh = true
bash = true
fish = true

[bootstrap.hooks.pre-dotfiles]
run = "mkdir -p ~/.local/state/bash/sessions ~/.config/bash ~/.config/zsh ~/.config/fish/conf.d ~/.config/nushell ~/.config/claude ~/.config/codex ~/.config/docker"

[bootstrap.hooks.final]
run = '''
[ "$(uname -s)" = Darwin ] || exit 0

mise env --dotenv |
while IFS='=' read -r name value; do
    [ -n "$name" ] && launchctl setenv "$name" "$value"
done
'''

[dotfiles]
# Sources under home/ mirror their targets and are resolved through dotfiles.root.
"~/.bash_sessions" = { source = "~/.local/state/bash/sessions", mode = "symlink" }
"~/.claude" = { source = "~/.config/claude", mode = "symlink" }
"~/.codex" = { source = "~/.config/codex", mode = "symlink" }
"~/.config/mise/config.toml" = { mode = "symlink" }
"~/.config/mise/mise.lock" = { mode = "symlink" }
"~/.bash_profile/local" = { block = '[[ -f "$HOME/.bashrc" ]] && . "$HOME/.bashrc"' }
"~/.bashrc/local" = { block = '[[ -f "$HOME/.config/bash/rc" ]] && . "$HOME/.config/bash/rc"' }
"~/.config/fish/conf.d/preferences.fish" = { mode = "copy" }
"~/.config/git/absorb" = { mode = "copy" }
"~/.config/git/alias" = { mode = "copy" }
"~/.config/git/branch" = { mode = "copy" }
"~/.config/git/color" = { mode = "copy" }
"~/.config/git/column" = { mode = "copy" }
"~/.config/git/commit" = { mode = "copy" }
"~/.config/git/config" = { mode = "copy" }
"~/.config/git/core" = { mode = "copy" }
"~/.config/git/credential" = { mode = "copy" }
"~/.config/git/credential-codespace" = { mode = "copy" }
"~/.config/git/delta" = { mode = "copy" }
"~/.config/git/diff" = { mode = "copy" }
"~/.config/git/fetch" = { mode = "copy" }
"~/.config/git/filter" = { mode = "copy" }
"~/.config/git/gpg" = { mode = "copy" }
"~/.config/git/gpg-codespace" = { mode = "copy" }
"~/.config/git/gitalias" = { source = "~/.local/share/mise/repos/gitalias/gitalias.txt", mode = "copy" }
"~/.config/git/help" = { mode = "copy" }
"~/.config/git/ignore" = { mode = "template" }
"~/.config/git/init" = { mode = "copy" }
"~/.config/git/interactive" = { mode = "copy" }
"~/.config/git/log" = { mode = "copy" }
"~/.config/git/merge" = { mode = "copy" }
"~/.config/git/pull" = { mode = "copy" }
"~/.config/git/push" = { mode = "copy" }
"~/.config/git/rebase" = { mode = "copy" }
"~/.config/git/rerere" = { mode = "copy" }
"~/.config/git/sequence" = { mode = "copy" }
"~/.config/git/tag" = { mode = "copy" }
"~/.config/npm/npmrc" = { mode = "copy" }
"~/.config/nushell/autoload/preferences.nu" = { mode = "copy" }
"~/.config/pitchfork/config.toml" = { mode = "copy" }
"~/.config/python/pythonrc" = { mode = "copy" }
"~/.config/readline/inputrc" = { mode = "copy" }
"~/.config/ssh/github" = { mode = "copy" }
"~/.config/ssh/mac" = { mode = "copy" }
"~/.config/ssh/term" = { mode = "copy" }
"~/.docker" = { source = "~/.config/docker", mode = "symlink" }
"~/.hushlogin" = { mode = "copy" }
"~/.ssh/config" = { mode = "copy" }
"~/.zshrc/local" = { block = '[[ -f "$HOME/.config/zsh/rc" ]] && . "$HOME/.config/zsh/rc"' }
"~/Library/Application Support/nushell" = { source = "~/.config/nushell", mode = "symlink" }

[tasks.bootstrap]
description = "Generate dynamic dotfiles and prepare local checkouts after mise tools are installed."
run = '''
set -eu

render_shell() {
    shell=$1
    fnox activate "$shell"
    pitchfork activate "$shell"
    wt config shell init "$shell"
    starship init "$shell" --print-full-init
}

render_shell bash > "$HOME/.config/bash/rc"
render_shell zsh > "$HOME/.config/zsh/rc"
render_shell fish > "$HOME/.config/fish/conf.d/local.fish"

(
    unset MISE_SHELL __MISE_DIFF
    mise activate nu --no-hook-env
    echo mise_hook
) > "$HOME/.config/nushell/env.nu"

{
    starship init nu
    fnox activate nu
    wt config shell init nu
} > "$HOME/.config/nushell/config.nu"

: "${GITHUB_USER:?Set GITHUB_USER to your GitHub username}"
github_api() {
    if [ -n "${GITHUB_TOKEN:-}" ]; then
        curl -fsSL -H "Authorization: Bearer ${GITHUB_TOKEN}" "$1"
    else
        curl -fsSL "$1"
    fi
}

profile=$(github_api "https://api.github.com/users/${GITHUB_USER}")
keys=$(curl -fsSL "https://github.com/${GITHUB_USER}.keys")
git_user=$(printf '%s\n' "$profile" | jaq -r '
    "[user]",
    "    name = \((.name // .login) | @json)",
    "    email = \(((.id | tostring) + "+" + .login + "@users.noreply.github.com") | @json)",
    "    signingkey = ~/.ssh/id_ed25519.pub"
')
allowed_signers=$(printf '%s' "$keys" | sed "s/^/${GITHUB_USER} /")

printf '%s\n' "$git_user" > ~/.config/git/user
printf '%s' "$keys" > ~/.ssh/authorized_keys
printf '%s' "$allowed_signers" > ~/.ssh/allowed_signers
grep -q '^github.com ' ~/.ssh/known_hosts 2>/dev/null || ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
grep -q '^\[ssh.github.com\]:443 ' ~/.ssh/known_hosts 2>/dev/null || ssh-keyscan -p 443 ssh.github.com >> ~/.ssh/known_hosts 2>/dev/null
'''

