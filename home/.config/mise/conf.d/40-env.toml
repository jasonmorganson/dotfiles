  "{{ env.GOPATH | default(value=env.HOME ~ '/.local/share/go') }}/bin",
  "{{ env.CARGO_HOME | default(value=env.HOME ~ '/.local/share/cargo') }}/bin",
  "~/.linuxbrew/bin",
  "~/.linuxbrew/sbin",
  "/opt/homebrew/bin",
  "/opt/homebrew/sbin",
