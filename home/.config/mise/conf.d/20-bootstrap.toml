[bootstrap.repos]
"~/.local/share/etc" = { url = "https://github.com/jasonmorganson/etc.git", ref = "5759223ae54351a2ba61adce1df28ca49caa7661" }
"~/.local/share/mise/repos/gitalias" = { url = "https://github.com/GitAlias/gitalias.git", ref = "main" }
"~/.config/nushell/scripts/nu_scripts" = { url = "https://github.com/nushell/nu_scripts.git" }

[bootstrap.hooks.pre-dotfiles]
run = "mkdir -p ~/.local/state/bash/sessions ~/.local/state/python ~/.config/bash ~/.config/zsh ~/.config/fish/conf.d ~/.config/nushell ~/.config/claude ~/.config/codex ~/.config/docker"
