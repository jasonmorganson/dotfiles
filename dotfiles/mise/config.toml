[settings]
lockfile = true

[tools]
gh = "latest"
fzf = "latest"
fnox = "latest"
helix = "latest"
gitui = "latest"
git-lfs = "latest"
chezmoi = "latest"
pitchfork = "latest"
starship = "latest"
vivid = "latest"
cargo-binstall = "latest"
"cargo:git-delta" = "latest"
"aqua:reemus-dev/gitnr" = { version = "latest", os = ["macos"] }
"github:lsd-rs/lsd" = "latest"
"aqua:BurntSushi/ripgrep" = "latest"
"github:max-sixty/worktrunk" = "latest"

[tools."github:MitMaro/git-interactive-rebase-tool"]
version = "latest"
[tools."github:MitMaro/git-interactive-rebase-tool".platforms]
macos-arm64 = { asset_pattern = "git-interactive-rebase-tool-*-macos-*_arm" }
macos-x64 = { asset_pattern = "git-interactive-rebase-tool-*-macos-*_intel" }
linux-x64 = { asset_pattern = "git-interactive-rebase-tool-*-ubuntu-*_amd64.deb" }
linux-arm64 = { asset_pattern = "git-interactive-rebase-tool-*-ubuntu-*_arm64.deb" }

[bootstrap.repos]
"~/.local/share/mise/repos/gitalias" = { url = "https://github.com/GitAlias/gitalias.git", ref = "main" }
"~/.config/nushell/scripts/nu_scripts" = { url = "https://github.com/nushell/nu_scripts.git" }
"~/.local/share/symphony" = { url = "https://github.com/openai/symphony.git" }

[bootstrap.mise_shell_activate]
zsh = true
bash = true
fish = true

[dotfiles]
# Keep migrated mise dotfile sources outside home/ so chezmoi does not manage the same target.
"~/.bash_sessions" = { source = "~/.local/state/bash/sessions", mode = "symlink" }
"~/.claude" = { source = "~/.config/claude", mode = "symlink" }
"~/.codex" = { source = "~/.config/codex", mode = "symlink" }
"~/.config/mise/config.toml" = { source = "~/.local/share/chezmoi/dotfiles/mise/config.toml", mode = "symlink" }
"~/.config/mise/mise.lock" = { source = "~/.local/share/chezmoi/dotfiles/mise/mise.lock", mode = "symlink" }
"~/.bashrc/local" = { block = '[[ -f "$HOME/.config/bash/rc" ]] && . "$HOME/.config/bash/rc"' }
"~/.config/bash/rc" = { source = "~/.local/share/chezmoi/dotfiles/bash/rc", mode = "copy" }
"~/.config/fish/conf.d/local.fish" = { source = "~/.local/share/chezmoi/dotfiles/fish/local.fish", mode = "copy" }
"~/.config/fish/conf.d/preferences.fish" = { source = "~/.local/share/chezmoi/dotfiles/fish/preferences.fish", mode = "copy" }
"~/.config/git/absorb" = { source = "~/.local/share/chezmoi/dotfiles/git/absorb", mode = "copy" }
"~/.config/git/alias" = { source = "~/.local/share/chezmoi/dotfiles/git/alias", mode = "copy" }
"~/.config/git/color" = { source = "~/.local/share/chezmoi/dotfiles/git/color", mode = "copy" }
"~/.config/git/commit" = { source = "~/.local/share/chezmoi/dotfiles/git/commit", mode = "copy" }
"~/.config/git/config" = { source = "~/.local/share/chezmoi/dotfiles/git/config", mode = "copy" }
"~/.config/git/core" = { source = "~/.local/share/chezmoi/dotfiles/git/core", mode = "copy" }
"~/.config/git/credential" = { source = "~/.local/share/chezmoi/dotfiles/git/credential", mode = "copy" }
"~/.config/git/credential-codespace" = { source = "~/.local/share/chezmoi/dotfiles/git/credential-codespace", mode = "copy" }
