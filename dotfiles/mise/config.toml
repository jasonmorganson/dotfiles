"~/.config/lsd/config.yaml" = { source = "~/.local/share/chezmoi/dotfiles/lsd/config.yaml", mode = "copy" }
"~/.config/npm/npmrc" = { source = "~/.local/share/chezmoi/dotfiles/npm/npmrc", mode = "copy" }
"~/.config/nushell/config.nu" = { source = "~/.local/share/chezmoi/dotfiles/nushell/config.nu.tmpl", mode = "template" }
"~/.config/nushell/env.nu" = { source = "~/.local/share/chezmoi/dotfiles/nushell/env.nu.tmpl", mode = "template" }
"~/.config/pitchfork/config.toml" = { source = "~/.local/share/chezmoi/dotfiles/pitchfork/config.toml", mode = "copy" }
"~/.config/python/pythonrc" = { source = "~/.local/share/chezmoi/dotfiles/python/pythonrc", mode = "copy" }
"~/.config/readline/inputrc" = { source = "~/.local/share/chezmoi/dotfiles/readline/inputrc", mode = "copy" }
"~/.config/ssh/github" = { source = "~/.local/share/chezmoi/dotfiles/ssh/config.d/github", mode = "copy" }
"~/.config/ssh/mac" = { source = "~/.local/share/chezmoi/dotfiles/ssh/config.d/mac", mode = "copy" }
"~/.config/ssh/term" = { source = "~/.local/share/chezmoi/dotfiles/ssh/config.d/term", mode = "copy" }
"~/.config/starship.toml" = { source = "~/.local/share/chezmoi/dotfiles/starship.toml.tmpl", mode = "template" }
"~/.config/zsh/rc" = { source = "~/.local/share/chezmoi/dotfiles/zsh/rc", mode = "copy" }
"~/.docker" = { source = "~/.config/docker", mode = "symlink" }
"~/.hushlogin" = { source = "~/.local/share/chezmoi/dotfiles/hushlogin", mode = "copy" }
"~/.local/bin/symphony" = { source = "~/.local/share/chezmoi/dotfiles/local/bin/symphony", mode = "copy" }
"~/.ssh/config" = { source = "~/.local/share/chezmoi/dotfiles/ssh/config", mode = "copy" }
"~/.zshrc/local" = { block = '[[ -f "$HOME/.config/zsh/rc" ]] && . "$HOME/.config/zsh/rc"' }
"~/Library/Application Support/nushell" = { source = "~/.config/nushell", mode = "symlink" }

[tasks.bootstrap]
description = "Generate dynamic dotfiles after mise tools are installed."
run = '''
GITHUB_USER="${GITHUB_USER:-$(gh api user --jq .login)}"
gh api user --template '{% raw %}{{printf "[user]\n    name = %q\n    email = %q\n    signingkey = ~/.ssh/id_ed25519.pub\n" .name (printf "%v+%s@users.noreply.github.com" .id .login)}}{% endraw %}' > ~/.config/git/user
gh api "users/${GITHUB_USER}/keys" --jq '.[].key' | tee ~/.ssh/authorized_keys | sed "s/^/${GITHUB_USER} /" > ~/.ssh/allowed_signers
grep -q '^github.com ' ~/.ssh/known_hosts 2>/dev/null || ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
grep -q '^\[ssh.github.com\]:443 ' ~/.ssh/known_hosts 2>/dev/null || ssh-keyscan -p 443 ssh.github.com >> ~/.ssh/known_hosts 2>/dev/null
'''

