"~/.config/git/diff" = { source = "~/.local/share/chezmoi/dotfiles/git/diff", mode = "copy" }
"~/.config/git/fetch" = { source = "~/.local/share/chezmoi/dotfiles/git/fetch", mode = "copy" }
