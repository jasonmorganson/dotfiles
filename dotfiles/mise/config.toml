"~/.config/git/help" = { source = "~/.local/share/chezmoi/dotfiles/git/help", mode = "copy" }
"~/.config/git/ignore" = { source = "~/.local/share/chezmoi/dotfiles/git/ignore.tmpl", mode = "template" }
"~/.config/git/interactive" = { source = "~/.local/share/chezmoi/dotfiles/git/interactive", mode = "copy" }
"~/.config/git/log" = { source = "~/.local/share/chezmoi/dotfiles/git/log", mode = "copy" }
"~/.config/git/merge" = { source = "~/.local/share/chezmoi/dotfiles/git/merge", mode = "copy" }
