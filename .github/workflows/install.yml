name: Test install script

on: push

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_USER: ${{ github.repository_owner }}

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, ubuntu-24.04, macos-14, macos-15, macos-26]
    runs-on: ${{ matrix.platform }}
    steps:
    - uses: actions/checkout@v7
    - name: Create canonical checkout
      run: |
        mkdir -p "$HOME/.local/share"
        cp -R "$GITHUB_WORKSPACE" "$HOME/.local/share/dotfiles"
    - name: Run install script
      run: "$HOME/.local/share/dotfiles/install.sh"
    - name: Re-run bootstrap without GitHub user
      run: env -u GITHUB_USER "$HOME/.local/bin/mise" run bootstrap
